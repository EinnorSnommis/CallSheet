  .stat-chip.warm .num { color: var(--yellow); }
  .stat-chip.pending .num { color: var(--blue); }

  .tab {

  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .school-card.status-contacted { border-left: 3px solid var(--blue); }
  .school-card.status-pending { border-left: 3px solid var(--text2); }

let callState = {};
let notesState = {};
try {
  callState = JSON.parse(localStorage.getItem('aiden_calls') || '{}');
  notesState = JSON.parse(localStorage.getItem('aiden_notes') || '{}');
} catch(e) {}

function save() {
  localStorage.setItem('aiden_calls', JSON.stringify(callState));
  localStorage.setItem('aiden_notes', JSON.stringify(notesState));
}

let currentTab = 'all';
let currentFilter = 'all';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  render();
}

function toggleCard(id) {
  document.getElementById('card-'+id)?.classList.toggle('open');
}

function toggleCall(key, e) {
  e.stopPropagation();
  callState[key] = !callState[key];
  save();
  render();
}

function updateNotes(key, val) {
  notesState[key] = val;
  save();
}

  const note = notesState[key] || '';

  const statusClass = `status-${school.status}`;
  const badgeClass = school.division === 'NJCAA' ? 'badge-njcaa' : school.division === 'NAIA' ? 'badge-naia' : 'badge-d3';

  let coachesHTML = school.coaches.map(c => {
    let contactLines = '';
    if (c.email) contactLines += `<div class="contact-line">${emailIcon()} <a href="mailto:${c.email.replace('Contact AD: ','')}">${c.email}</a></div>`;
    if (c.phone) contactLines += `<div class="contact-line">${phoneIcon()} <a href="tel:${c.phone.replace(/[^0-9+]/g,'')}">${c.phone}</a></div>`;
    return `<div class="coach-tile">
      <div class="name">${c.name}</div>
      <div class="title">${c.title}</div>
      ${contactLines}
    </div>`;
  }).join('');

  let keyNoteHTML = school.keyNote ? `<div class="key-note">⚡ ${school.keyNote}</div>` : '';

  return `
  <div class="school-card ${statusClass}" id="card-${idx}">
    <div class="card-header" onclick="toggleCard(${idx})">
      <div class="card-left">
        <div>
          <div class="school-name">${school.name}</div>
          <div class="school-meta">
            <span class="badge ${badgeClass}">${school.division}</span>
            <span class="badge badge-${school.status}">${school.statusLabel}</span>
            <span style="font-size:11px;color:var(--text2)">${school.location}</span>
          </div>
        </div>
      </div>
      <div class="card-right">
        <button class="call-status-btn ${called?'called':''}" onclick="toggleCall('${key}', event)">
          ${called ? '✓ Called' : '☎ Mark Called'}
        </button>
        ${chevronIcon()}
      </div>
    </div>
    <div class="card-body">
      ${keyNoteHTML}
      <div class="section-title" style="margin-top:12px;font-size:12px;">Coaching Staff</div>
      <div class="coach-grid">${coachesHTML}</div>
      <div class="school-details">
        <div class="detail-item"><div class="label">Type</div><div class="value">${school.type}</div></div>
        <div class="detail-item"><div class="label">Cost</div><div class="value">${school.cost}</div></div>
        <div class="detail-item"><div class="label">Engineering</div><div class="value">${school.engineering}</div></div>
        <div class="detail-item"><div class="label">Housing</div><div class="value">${school.housing || 'TBD'}</div></div>
        <div class="detail-item"><div class="label">Setting</div><div class="value">${school.setting}</div></div>
      </div>
      <div class="notes-area">
        <label>Pre-loaded Notes</label>
        <p style="font-size:12px;color:var(--text2);margin-top:4px;line-height:1.5;">${school.notes}</p>
      </div>
      <div class="notes-area" style="margin-top:10px;">
        <label>Your Call Notes</label>
        <textarea placeholder="Add notes after the call…" oninput="updateNotes('${key}', this.value)">${note}</textarea>
      </div>
    </div>
  </div>`;
}

function render() {
  let filtered = SCHOOLS.filter(s => {
    if (currentTab === '4year' && s.type !== '4-year') return false;
    if (currentTab === 'juco' && s.type !== '2-year') return false;
    if (currentFilter === 'offer' && s.status !== 'offer') return false;
    if (currentFilter === 'warm' && s.status !== 'warm') return false;
    if (currentFilter === 'contacted' && s.status !== 'contacted') return false;
    if (currentFilter === 'pending' && s.status !== 'pending') return false;
    if (currentFilter === 'called' && !callState[s.name.replace(/\s/g,'_')]) return false;
    if (currentFilter === 'notcalled' && callState[s.name.replace(/\s/g,'_')]) return false;
    return true;
  });

  // Stats
  const total = SCHOOLS.length;
  const offers = SCHOOLS.filter(s=>s.status==='offer').length;
  const warm = SCHOOLS.filter(s=>s.status==='warm').length;
  const contacted = SCHOOLS.filter(s=>s.status==='contacted').length;
  const calledCount = SCHOOLS.filter(s=>callState[s.name.replace(/\s/g,'_')]).length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-chip"><span class="num">${total}</span> Total</div>
    <div class="stat-chip offer"><span class="num">${offers}</span> Offer</div>
    <div class="stat-chip warm"><span class="num">${warm}</span> Warm</div>
    <div class="stat-chip"><span class="num">${contacted}</span> Contacted</div>
    <div class="stat-chip pending"><span class="num">${total - offers - warm - contacted}</span> Pending</div>
    <div class="stat-chip" style="border-color:var(--green)"><span class="num" style="color:var(--green)">${calledCount}</span> Called</div>
  `;

  // Sort: offer → warm → contacted → pending
  const order = {offer:0, warm:1, contacted:2, pending:3};
  filtered.sort((a,b) => (order[a.status]||3) - (order[b.status]||3));

  let html = `
    <div class="filter-bar">
      <button class="filter-btn ${currentFilter==='all'?'active':''}" data-filter="all" onclick="setFilter('all')">All</button>
      <button class="filter-btn ${currentFilter==='offer'?'active':''}" data-filter="offer" onclick="setFilter('offer')">Offers</button>
      <button class="filter-btn ${currentFilter==='warm'?'active':''}" data-filter="warm" onclick="setFilter('warm')">Warm Leads</button>
      <button class="filter-btn ${currentFilter==='contacted'?'active':''}" data-filter="contacted" onclick="setFilter('contacted')">Contacted</button>
      <button class="filter-btn ${currentFilter==='pending'?'active':''}" data-filter="pending" onclick="setFilter('pending')">Pending</button>
      <button class="filter-btn ${currentFilter==='called'?'active':''}" data-filter="called" onclick="setFilter('called')">✓ Called</button>
      <button class="filter-btn ${currentFilter==='notcalled'?'active':''}" data-filter="notcalled" onclick="setFilter('notcalled')">Not Called</button>
    </div>
  `;

  if (filtered.length === 0) {
    html += `<p style="color:var(--text2);text-align:center;padding:40px;">No schools match this filter.</p>`;
  } else {
    filtered.forEach((s, i) => {
      html += renderCard(s, SCHOOLS.indexOf(s));
    });
  }

  document.getElementById('content').innerHTML = html;
}

render();
</script>
</body>
</html>
